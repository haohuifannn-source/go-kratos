syntax = "proto3";
package kratos.api;

option go_package = "bubble/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  string mode = 3;
  Token token = 4;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string dsn = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}
message Token{
  message AcessToken{
    string access_secret = 1;
    int64 access_expire = 2;
  }
  message RefreshToken{
    string refresh_secret = 1;
    int64 refresh_expire = 2;
  }
  AcessToken access_token = 1;
  RefreshToken refresh_token = 2;
}
